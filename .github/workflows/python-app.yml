name: Tesla Hunter

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # Gira in automatico ogni giorno

permissions:
  contents: write # Permesso fondamentale per salvare i doppioni

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python main.py

      - name: Salva cronologia auto viste
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          # Crea il file se non esiste al primo avvio
          if [ ! -f visti.json ]; then echo "[]" > visti.json; fi
          git add visti.json
          git diff-index --quiet HEAD || git commit -m "Aggiornato elenco auto viste [skip ci]" && git push
